            "@type": "Answer",
            "text": "Siwaht offers five main services: AI Video Ads (custom video advertisements), AI Avatars (realistic digital personas), Voice Ads (multilingual voice synthesis in 50+ languages), Video Editing (professional post-production), and Podcast Production (complete audio production services)."

        },
        {
          "@type": "Question",
          "name": "How long does it take to create an AI video ad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our standard turnaround time for AI video ads is 72 hours. We can accommodate rush orders for urgent projects. Contact us to discuss your specific timeline requirements."
          }
        },
        {
          "@type": "Question",
          "name": "What languages do you support for voice ads?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We support voice synthesis in over 50 languages including English, Spanish, French, German, Italian, Portuguese, Chinese, Japanese, Korean, Arabic, Hindi, Russian, and many more."
          }

        {
